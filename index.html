<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="TUGON — Coordinated incident response and emergency reporting for Tondo, Manila. Report incidents, track status, and access emergency hotlines." />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>TUGON — Tondo Emergency Response Portal</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Preconnect to API backend (eliminates DNS + TLS handshake on first API call) -->
    <link rel="preconnect" href="https://tugon-aapz.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://tugon-aapz.onrender.com" />

    <!-- Preload ONLY the AVIF hero (browser picks first supported format in <picture>) -->
    <link rel="preload" as="image" href="/hero-city.avif" type="image/avif" fetchpriority="high" />

    <!-- Preload critical font weights to eliminate the CSS→font-file round trip (FCP) -->
    <link rel="preload" href="/fonts/public-sans-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/ibm-plex-sans-400.woff2" as="font" type="font/woff2" crossorigin />

    <!--
      Inline critical styles — kept minimal and intentional:
      1. @font-face for the two body-weight cuts: browser registers the faces
         before fonts.css parses, so the preloaded bytes land into a known face
         immediately (FCP).
      2. [data-reveal] initial state: prevents a flash where hero elements
         briefly appear at full opacity before landing.css loads and hides them
         for the scroll-reveal animation (Speed Index / visual stability).
    -->
    <style>
      @font-face {
        font-family: 'Public Sans';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/public-sans-400.woff2') format('woff2');
      }
      @font-face {
        font-family: 'IBM Plex Sans';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/ibm-plex-sans-400.woff2') format('woff2');
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
