name: Trigger Vercel Deploy Hook

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-vercel-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy hook secret exists
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing required secret: VERCEL_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          # Do not echo the hook URL; treat it as a credential.
          curl --fail --silent --show-error --request POST "$VERCEL_DEPLOY_HOOK_URL"
