name: Render Deploy Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail

          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::Missing RENDER_DEPLOY_HOOK_URL secret"
            exit 1
          fi

          echo "Triggering Render deploy..."
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $(cat response.txt)"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Deploy hook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Deploy triggered successfully"

      - name: Wait for Render deploy to finish
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          API="https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=5"
          AUTH="Authorization: Bearer ${RENDER_API_KEY}"

          echo "Waiting for deploy to register..."
          sleep 10

          # Get the most recent deploy
          DEPLOY_ID=""
          for i in $(seq 1 12); do
            RESPONSE=$(curl -fsS -H "$AUTH" -H "Accept: application/json" "$API")
            DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.[0].deploy.id // empty')
            if [ -n "$DEPLOY_ID" ]; then
              echo "Found deploy: $DEPLOY_ID"
              break
            fi
            echo "Deploy not yet registered, retrying in 5s (attempt $i/12)..."
            sleep 5
          done

          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::No Render deploy found after triggering"
            exit 1
          fi

          # Poll deploy status until terminal
          DEPLOY_API="https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}"
          while true; do
            STATUS=$(curl -fsS -H "$AUTH" -H "Accept: application/json" "$DEPLOY_API" | jq -r '.status')
            echo "Deploy status: $STATUS"
            case "$STATUS" in
              live)
                echo "::notice::Render deploy succeeded"
                exit 0
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "::error::Render deploy ended with status: $STATUS"
                echo "View logs: https://dashboard.render.com/web/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}"
                exit 1
                ;;
              created|build_in_progress|update_in_progress|pre_deploy_in_progress|queued)
                sleep 15
                ;;
              *)
                echo "Unknown status: $STATUS (treating as in-progress)"
                sleep 15
                ;;
            esac
          done
